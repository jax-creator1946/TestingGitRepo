<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

.card
{

 background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0, 0, 0, 0.5)),url('coffee1.jpg'); 
background-position: center;
background-size: cover;
max-width: 400px;
max-height: 400px;
height: 400px;
width: 400px;
color:white;
display: flex; /* ✅ change from grid */
  align-items: stretch; /* ✅ makes children take full height */
justify-content: center;
align-items: center;

text-align: center;
}
.card-body
{

height: 90%;
width: 90%;
position: relative;
display: grid;
place-content: center;
padding: 10px;

}
.card-body::after
{
    content: '';
position: absolute;
width: 0%;
height: 100%;
border-top: 1px solid white;
border-bottom: 1px solid white;

transition: all 1.5s;
top: 50%;
left:50%;

transform: translate(-50%,-50%);

}
.card-body:hover::after {
  width: 100%;
  height: 100%;

}

.card-body::before
{
    content: '';
position: absolute;
width: 100%;
height: 0%;
border-left: 1px solid white;
border-right: 1px solid white;

transition: all 1.5s;
top: 50%;
left:50%;

transform: translate(-50%,-50%);

}

.card-body:hover::before {
  width: 100%;
  height: 100%;

}
.card-body h1{
font-weight: 100;
font-size: 2.5rem;

}
   </style>
</head>
<body>
 <div class="card">
    <div class="card-body">
<h1>
    hi how are you</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing. Lorem, ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus, tempore.</p>

        
    </div>


 </div>   


</body>
</html>
